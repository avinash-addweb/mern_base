services:
  mongodb:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  postgres:
    image: postgres:16-alpine
    ports:
      - "54320:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: base_mern
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mysql:
    image: mysql:8
    ports:
      - "33060:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: base_mern
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    ports:
      - "9201:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  seq:
    image: datalust/seq:latest
    ports:
      - "8081:80"
      - "5341:5341"
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seq_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    ports:
      - "4100:4100"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    environment:
      NODE_ENV: development
      PORT: 4100
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/base_mern?schema=public
      MONGODB_URI: mongodb://mongodb:27017/base_mern
      JWT_SECRET: docker-dev-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      SEQ_URL: http://seq:5341
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      - mongodb
      - postgres
      - seq
      - redis
      - elasticsearch

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    ports:
      - "4200:4200"
    volumes:
      - ./apps/web/src:/app/apps/web/src
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4100/api/v1
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      target: dev
    ports:
      - "4300:4300"
    volumes:
      - ./apps/admin/src:/app/apps/admin/src
    environment:
      VITE_API_URL: http://localhost:4100/api/v1
    depends_on:
      - api

volumes:
  mongodb_data:
  postgres_data:
  mysql_data:
  seq_data:
  redis_data:
  elasticsearch_data:
